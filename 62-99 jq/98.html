<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title></title>
    <script src="jquery-4.0.0.min.js"></script>
</head>

<body>
   <a href="https://google.com">Google</a>

    <script>
        $(document).ready(function() {
            $('a').on('mouseenter', function() {
                let link = $(this).attr('href');
                $(this).append(' (' + link + ')');
            });
        });

    </script>
</body>

</html>
