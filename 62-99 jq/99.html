<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title></title>
    <script src="jquery-4.0.0.min.js"></script>
</head>

<body>
<a href="https://google.com">Google</a>

    <script>
$(document).ready(function() {
            function addHref() {
                let link = $(this).attr('href');
                $(this).append(' (' + link + ')');
                $(this).off('mouseenter', addHref);
            }
            $('a').on('mouseenter', addHref);

        });

    </script>
</body>

</html>
