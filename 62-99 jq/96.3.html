<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title></title>
    <script src="jquery-4.0.0.min.js"></script>
</head>

<body>
    <p>1</p>
    <p>2</p>
    <p>3</p>
    <script>
 $(document).ready(function() {
            $('p').click(function() {
                let val = $(this).text();
                let num = Number(val);
                let square = num * num;
                $(this).append(' = ' + square);
            });
        });
    </script>
</body>

</html>
